<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Dancing Script">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}" style="color: goldenrod; font-family: 'Dancing Script'; font-size: 1.4rem;">DineX</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="{% url 'home' %}" style="color: white;">Home</a>
                </li

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'products' %}" style="color: white;">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}" style="color: white;">Contact</a>
                </li>
            </ul>

            {% if user.is_authenticated %}
            <div class="d-flex align-items-center">
                <p class="mt-3 px-2 text-white mb-0">Welcome {{ user.username }}</p>
            
                <a class="btn btn-outline-warning btn-sm mx-2" href="{% url 'view_cart' %}">
                    <i class="bi bi-cart3"></i> Cart
                </a>
            
                <form method="post" action="{% url 'logoutuser' %}" class="m-0">
                    {% csrf_token %}
                    <button class="btn btn-primary btn-sm" type="submit">Logout</button>
                </form>
            </div>
            {% else %}
            <div class="d-flex align-items-center">
                <form class="px-2 m-0" action="{% url 'loginuser' %}" method="get">
                    {% csrf_token %}
                    <button class="btn btn-primary btn-sm" type="submit">Login</button>
                </form>
            
                <form class="m-0" action="{% url 'signupuser' %}" method="get">
                    {% csrf_token %}
                    <button class="btn btn-primary btn-sm" type="submit">Signup</button>
                </form>
            </div>
            {% endif %}
            
            <form class="d-flex px-2 m-0" role="search" method="post" action="{% url 'find_product' %}">
                {% csrf_token %}
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" name="prod_search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            </div>
            </div>
            </nav>
