<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Dancing Script">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    /* Global Navbar Uniform Premium Design */
    .navbar {
        background-color: #111111 !important;
        padding: 12px 0 !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
    }

    .navbar .navbar-brand {
        font-size: 1.4rem !important;
        font-weight: 700 !important;
        font-style: normal !important;
        letter-spacing: 3px !important;
        text-transform: uppercase !important;
        color: #FAF7F2 !important;
        font-family: 'Montserrat', 'Helvetica Neue', sans-serif !important;
    }

    .navbar .nav-link {
        font-size: 0.85rem !important;
        font-weight: 500 !important;
        letter-spacing: 1px !important;
        text-transform: uppercase !important;
        color: #D1C9BC !important;
    }

    .navbar .nav-link:hover {
        color: #FAF7F2 !important;
    }

    /* Logout aur Search buttons ka blue/green rang hatane ke liye */
    .navbar .btn-primary,
    .navbar .btn-outline-success,
    .navbar .btn {
        background-color: transparent !important;
        color: #FAF7F2 !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        font-size: 0.8rem !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
        padding: 6px 14px !important;
        border-radius: 4px !important;
        transition: all 0.3s ease !important;
    }

    .navbar .btn:hover {
        background-color: #FAF7F2 !important;
        color: #111111 !important;
    }

    .navbar .form-control {
        background-color: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        color: #FFFFFF !important;
        font-size: 0.85rem !important;
    }

    .navbar .form-control::placeholder {
        color: #888888 !important;
    }
</style>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}" style="color: goldenrod; font-family: 'Dancing Script'; font-size: 1.4rem;">DineX</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="{% url 'home' %}" style="color: white;">Home</a>
                </li

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'products' %}" style="color: white;">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}" style="color: white;">Contact</a>
                </li>
            </ul>

            {% if user.is_authenticated %}
            <div class="d-flex align-items-center">
                <p class="mt-3 px-2 text-white mb-0">Welcome {{ user.username }}</p>
            
                <a class="btn btn-outline-warning btn-sm mx-2" href="{% url 'view_cart' %}">
                    <i class="bi bi-cart3"></i> Cart
                </a>
            
                <form method="post" action="{% url 'logoutuser' %}" class="m-0">
                    {% csrf_token %}
                    <button class="btn btn-primary btn-sm" type="submit">Logout</button>
                </form>
            </div>
            {% else %}
            <div class="d-flex align-items-center">
                <form class="px-2 m-0" action="{% url 'loginuser' %}" method="get">
                    {% csrf_token %}
                    <button class="btn btn-primary btn-sm" type="submit">Login</button>
                </form>
            
                <form class="m-0" action="{% url 'signupuser' %}" method="get">
                    {% csrf_token %}
                    <button class="btn btn-primary btn-sm" type="submit">Signup</button>
                </form>
            </div>
            {% endif %}
            
            <form class="d-flex px-2 m-0" role="search" method="post" action="{% url 'find_product' %}">
                {% csrf_token %}
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" name="prod_search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            </div>
            </div>
            </nav>
