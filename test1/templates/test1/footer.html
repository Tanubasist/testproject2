<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .social-icons a i {
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .bi-facebook:hover {
            color: #1877F2 !important;
            transform: scale(1.1);
        }

        .bi-instagram:hover {
            color: #E1306C !important;
            transform: scale(1.1);
        }

        .bi-twitter:hover {
            color: #1DA1F2 !important;
            transform: scale(1.1);
        }

        .bi-pinterest:hover {
            color: #BD081C !important;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="container-fluid text-center py-3 social-icons"
        style="background-color: #212529; border-top: 1px solid #343a40;">
        <div class="row align-items-center">

            <div class="col-12 mb-1">
                <span>
                    <a href="https://www.facebook.com/" target="_blank"><i class="bi bi-facebook mx-3 fs-4"
                            style="color: white;"></i></a>
                    <a href="https://www.instagram.com/" target="_blank"><i class="bi bi-instagram mx-3 fs-4"
                            style="color: white;"></i></a>
                    <a href="https://twitter.com/" target="_blank"><i class="bi bi-twitter mx-3 fs-4"
                            style="color: white;"></i></a>
                    <a href="https://www.pinterest.com/" target="_blank"><i class="bi bi-pinterest mx-3 fs-4"
                            style="color: white;"></i></a>
                </span>
            </div>

            <div class="col-12">
                <p class="text-muted mb-0" style="font-size: 0.75rem; letter-spacing: 0.5px;">
                    © 2026 DineX. Crafted for the premium taste.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
