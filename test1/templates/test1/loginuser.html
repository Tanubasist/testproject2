<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-beige: #FAF7F2;
            --text-black: #111111;
            --card-bg: #FFFFFF;
            --border-color: #E6DFD3;
        }
    
        body {
            background-color: var(--bg-beige) !important;
            color: var(--text-black) !important;
            font-family: 'Poppins', 'Montserrat', sans-serif !important;
        }
    
        /* Targetting Sir's specific layout container */
        .container .row {
            margin-top: 60px !important;
        }
    
        .container h2 {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 700 !important;
            letter-spacing: 3px !important;
            text-transform: uppercase;
            font-size: 1.8rem !important;
            color: var(--text-black);
            margin-bottom: 25px;
        }
    
        /* Style override for Sir's form container without changing logic */
        form:not(.nav-search-form) {
            max-width: 450px;
            margin: 0 auto 60px auto;
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            padding: 35px !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01) !important;
        }
    
        /* Form fields styling */
        form:not(.nav-search-form) .form-control {
            background-color: #FFFFFF !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-black) !important;
            border-radius: 6px !important;
            padding: 12px 15px !important;
            font-size: 0.95rem !important;
            margin-bottom: 15px !important;
            height: auto !important;
            width: 100% !important;
        }
    
        form:not(.nav-search-form) .form-control:focus {
            border-color: var(--text-black) !important;
            box-shadow: none !important;
        }
    
        /* Matte Black Login Button Override */
        form:not(.nav-search-form) .btn-primary {
            background-color: var(--text-black) !important;
            color: var(--bg-beige) !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 12px 30px !important;
            font-size: 0.85rem !important;
            font-weight: 500 !important;
            letter-spacing: 1px !important;
            text-transform: uppercase;
            width: 100% !important;
            height: auto !important;
            margin-top: 10px;
            transition: background-color 0.3s ease !important;
        }
    
        form:not(.nav-search-form) .btn-primary:hover {
            background-color: #2D2D2D !important;
            color: #FFFFFF !important;
        }
    
        /* Navbar constraints sync */
        .navbar .navbar-right-container .btn,
        .navbar .navbar-right-container button {
            background-color: transparent !important;
            color: #FAF7F2 !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            font-size: 0.8rem !important;
            height: 32px !important;
            max-height: 32px !important;
            width: auto !important;
            padding: 4px 12px !important;
            display: inline-flex !important;
            align-items: center !important;
        }
    
        .navbar .form-control {
            height: 32px !important;
            width: 150px !important;
        }
    
        .navbar .nav-search-form {
            display: inline-flex !important;
            max-width: none !important;
            padding: 0 !important;
            margin: 0 !important;
            background: transparent !important;
            border: none !important;
        }
    </style>
</head>

<body>

    <div class="container mt-4 text-center">
        <h2 class="alert alert-primary text-center">Login Form</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="">
            {% csrf_token %}
            {{ form.as_p }}
            <br>
            <button class="btn btn-primary" type="submit">Login</button>
        </form>

    </div>

</body>

</html>
