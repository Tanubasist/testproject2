<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* 🎨 Global Aesthetic Theme Layout */
        :root {
            --bg-beige: #FAF7F2;
            --text-black: #111111;
            --card-bg: #FFFFFF;
            --border-color: #E6DFD3;
        }

        body {
            background-color: var(--bg-beige) !important;
            color: var(--text-black) !important;
            font-family: 'Poppins', 'Montserrat', sans-serif !important;
        }

        /* 📌 Strict Top Navbar Layout Scaling Lock (Exact same as home/product) */
        .navbar {
            background-color: #111111 !important;
            padding: 10px 0 !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        .navbar .navbar-brand {
            font-size: 1.4rem !important;
            font-weight: 700 !important;
            letter-spacing: 3px !important;
            text-transform: uppercase !important;
            line-height: 1.2 !important;
            color: #FAF7F2 !important;
            font-family: 'Montserrat', sans-serif !important;
        }

        .navbar .nav-link {
            font-size: 0.85rem !important;
            font-weight: 500 !important;
            letter-spacing: 1px !important;
            text-transform: uppercase !important;
            padding: 6px 12px !important;
            line-height: 1.4 !important;
            color: #D1C9BC !important;
        }

        /* 🔐 Force-stopping button sizing stretch inside Top Nav */
        .navbar .navbar-right-container .btn,
        .navbar .navbar-right-container button {
            background-color: transparent !important;
            color: #FAF7F2 !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            font-size: 0.8rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
            padding: 4px 12px !important;
            border-radius: 4px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            height: 32px !important;
            max-height: 32px !important;
            width: auto !important;
            line-height: 1 !important;
            box-shadow: none !important;
            transition: all 0.3s ease !important;
        }

        .navbar .navbar-right-container .btn:hover,
        .navbar .navbar-right-container button:hover {
            background-color: #FAF7F2 !important;
            color: #111111 !important;
            border-color: #FAF7F2 !important;
        }

        .navbar .navbar-text-welcome {
            font-size: 0.85rem !important;
            line-height: 32px !important;
            display: inline-block !important;
            color: #CFCFCF !important;
        }

        /* Slim Search Bar sizing sync */
        .navbar .form-control {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #FFFFFF !important;
            font-size: 0.85rem !important;
            height: 32px !important;
            width: 140px !important;
            border-radius: 4px !important;
            padding: 4px 10px !important;
            display: inline-block !important;
        }

        .navbar .nav-search-form {
            display: flex !important;
            align-items: center !important;
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
            box-shadow: none !important;
            max-width: none !important;
        }

        /* 📌 Main Content Elements Style Override */
        .container h1.alert-primary {
            background-color: transparent !important;
            border: none !important;
            color: var(--text-black) !important;
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 700 !important;
            letter-spacing: 4px !important;
            text-transform: uppercase;
            font-size: 2.2rem !important;
            margin-top: 50px !important;
            margin-bottom: 40px !important;
            padding: 0 !important;
            text-align: center;
        }

        /* 📜 Left Side Information text layout */
        .col-md-6 h5.display-6 {
            font-size: 1.5rem !important;
            font-style: italic;
            font-weight: 400;
            line-height: 1.4;
            margin-bottom: 25px !important;
            color: #555555;
        }

        .col-md-6 h5:not(.display-6) {
            font-size: 1rem !important;
            font-weight: 500;
            margin-bottom: 12px !important;
            color: var(--text-black);
            letter-spacing: 0.3px;
        }

        /* 🗺️ Map Container Styling */
        iframe {
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01) !important;
        }

        .container h2.text-center {
            font-family: 'Montserrat', sans-serif !important;
            font-size: 1.6rem !important;
            font-weight: 600 !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 50px !important;
            margin-bottom: 25px !important;
        }

        /* 📝 Bottom Form Box - Completely Isolated from Top Navbar Form styles */
        .contact-form {
            max-width: 650px;
            margin: 0 auto 60px auto;
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 12px !important;
            padding: 30px !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01) !important;
        }

        .contact-form .form-control {
            background-color: #FFFFFF !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-black) !important;
            border-radius: 6px !important;
            padding: 12px 15px !important;
            font-size: 0.95rem !important;
            margin-bottom: 15px !important;
            height: auto !important;
            width: 100% !important;
            transition: border-color 0.3s ease !important;
        }

        .contact-form .form-control:focus {
            border-color: var(--text-black) !important;
            box-shadow: none !important;
        }

        .contact-form input[placeholder="Enter Your Message"] {
            padding-bottom: 50px !important;
        }

        .contact-form .btn-primary {
            background-color: var(--text-black) !important;
            color: var(--bg-beige) !important;
            border: none !important;
            border-radius: 6px !important;
            padding: 12px 30px !important;
            font-size: 0.85rem !important;
            font-weight: 500 !important;
            letter-spacing: 1px !important;
            text-transform: uppercase;
            width: 100% !important;
            height: auto !important;
            max-height: none !important;
            transition: background-color 0.3s ease, transform 0.2s ease !important;
            margin-top: 5px;
        }

        .contact-form .btn-primary:hover {
            background-color: #2D2D2D !important;
            color: #FFFFFF !important;
        }

        .alert-primary,
        [class*="alert-"],
        .alert {
            background-color: transparent !important;
            border: none !important;
            color: #111111 !important;
            box-shadow: none !important;
        }
    </style>
</head>

<body>

    {% include 'test1/navbar.html' %}

    <div class="container">
        <h1 class="alert alert-primary text-center mt-2">Contact Us</h1>
        <div class="row align-items-center">
            <div class="col-md-6 mb-4 mb-md-0">
                <h5 class="display-6">"A restaurant is where flavors meet friendships"</h5>
                <h5>Email: abc@gmail.com</h5>
                <h5>Phone: +91 1234567890</h5>
                <h5>Address: Saket, New Delhi, India</h5>
                <h5>Operating Hours: 10:00 AM - 11:00 PM, all seven days</h5>
            </div>
            <div class="col-md-6">
                <!-- Google Maps Frame -->
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14022.151598689306!2d77.19862448556015!3d28.523547611585922!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390ce1f0dd053fdd%3A0x97d95c1a5860139f!2sSaket%2C%20New%20Delhi%2C%20Delhi!5e0!3m2!1sen!2sin!4v1783419564401!5m2!1sen!2sin"
                    width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="strict-origin-when-cross-origin"></iframe>
            </div>
        </div>

        <h2 class="mt-2 text-center">Have Some Questions?</h2>

        <form method="post" class="contact-form">
            {% csrf_token %}
            <input placeholder="Enter Your Name" class="form-control" name="name" required>
            <input placeholder="Enter Your Email" class="form-control" name="email" type="email" required>
            <input placeholder="Enter Your Message" class="form-control" name="message" required>
            <button class="btn btn-primary" type="submit">Send Message</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
